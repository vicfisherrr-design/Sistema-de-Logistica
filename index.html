<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Logístico Sherwin-Williams</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:350px;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    width:180px;
    margin-bottom:25px;
}

h1{
    color:#004A8F;
    font-size:24px;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#004A8F;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#00376b;
}

</style>
</head>

<body>

<div class="container">

    <img class="logo"
    src="https://tse1.mm.bing.net/th/id/OIP.CMeAGQ1yxszkqRsW-KlDWAHaEK?pid=Api&P=0&h=180">

    <h1>Sistema Logístico Sherwin-Williams</h1>

    <input type="text"
    id="usuario"
    placeholder="Usuário">

    <input type="password"
    id="senha"
    placeholder="Senha">

    <button onclick="entrar()">
        Entrar
    </button>

</div>


<script>

let tentativas = 0;

function entrar(){

    let usuario = document.getElementById("usuario").value;
    let senha = document.getElementById("senha").value;

    if(tentativas >= 3){

        alert("Usuário bloqueado.\n\nPor favor, contate o departamento de T.I.");
        return;

    }

    if(usuario === "felipe" && senha === "1234"){

        window.location.href = "interface.html";

    }
    else{

        tentativas++;

        if(tentativas >= 3){

            alert("Usuário bloqueado.\n\nPor favor, contate o departamento de T.I.");

        }
        else{

            alert("Usuário ou senha incorretos.\nTentativa " + tentativas + " de 3.");

        }

    }

}

</script>

</body>
</html>
